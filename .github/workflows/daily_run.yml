name: Daily Run - PythonTemplate

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]
  workflow_dispatch:
  #schedule:
  #  - cron: "30 06 * * 2-6" # Daily at 06:30 AM UTC

jobs:
  Job1:
    runs-on: ubuntu-latest
    container:
      image: argonur/finances:fenrir-dev

    steps:
      - name: ⬇️ Clonar repositorio
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip setuptools wheel

      - name: Install package in editable mode (dev dependencies)
        run: |
          pip install -e ".[dev]"

      - name: 🧪 Ejecutar pruebas y coverage
        run: |
          python src/main.py
          pytest

      - name: 📁 Subir reportes como artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-and-test-reports
          path: htmlcov/
