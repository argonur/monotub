name: Local Actions - PythonTemplate

# Solo se activa manualmente
on:
  workflow_dispatch: {}

env:
  NPROC: 4

jobs:
  Job1:
    runs-on: [self-hosted, local]
    container:
      image: argonur/finances:fenrir-dev

    steps:
      - name: ⬇️ Clonar código del repositorio
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip setuptools wheel

      - name: Install package in editable mode (dev dependencies)
        run: |
          pip install -e ".[dev]"

      - name: 🧪 Ejecutar pruebas y correr la aplicación
        run: |
          pip install -e .
          python src/main.py
          pytest